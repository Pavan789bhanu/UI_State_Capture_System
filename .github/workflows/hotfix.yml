name: Hotfix

# Full CI for hotfix/* branches.
# Hotfixes branch from main, fix the issue, then PR into BOTH main AND dev.

on:
  push:
    branches:
      - 'hotfix/**'
  pull_request:
    branches:
      - main
      - dev

jobs:
  frontend:
    name: Frontend CI (Hotfix)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint --if-present
      - run: npm run build

  backend:
    name: Backend CI (Hotfix)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt
      - run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx ruff
      - run: ruff check . --ignore E501
      - run: pytest --tb=short -v || echo "No tests found"
