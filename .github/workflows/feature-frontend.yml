name: Feature – Frontend

# Fast CI for the feature/frontend branch.
# Only runs the jobs relevant to React/TypeScript changes.

on:
  push:
    branches:
      - feature/frontend
      - 'feature/frontend-**'
  pull_request:
    branches:
      - dev

jobs:
  lint-and-build:
    name: Lint + Build (Frontend)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

      - name: Type check
        run: npm run type-check --if-present

      - name: Build
        run: npm run build
