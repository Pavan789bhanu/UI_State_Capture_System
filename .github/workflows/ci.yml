name: CI/CD Pipeline

# ─────────────────────────────────────────────────────────────────────────────
# Branch strategy
#
#   main             ← production-ready, protected
#                      only accepts PRs from dev (or hotfix/*)
#
#   dev              ← integration / staging
#                      frontend + backend merge here; full CI runs
#
#   feature/frontend ← React / TypeScript development
#                      frontend CI only (lint, type-check, build)
#
#   feature/backend  ← FastAPI / Python development
#                      backend CI only (lint, tests)
#
#   hotfix/*         ← emergency production patches
#                      full CI; PRs target main AND dev
#
#   release/*        ← release preparation
#                      full CI; PRs target main
# ─────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches:
      - main
      - dev
      - feature/frontend
      - feature/backend
      - 'feature/**'
      - 'hotfix/**'
      - 'release/**'
  pull_request:
    branches:
      - main
      - dev
  workflow_dispatch:

env:
  FRONTEND_URL: http://localhost:5173
  BACKEND_URL: http://localhost:8000

# ─────────────────────────────────────────────────────────────────────────────
# Helper: which jobs should run?
#
#   Frontend CI  → feature/frontend, feature/frontend-*, dev, main, hotfix/*, release/*
#   Backend CI   → feature/backend,  feature/backend-*,  dev, main, hotfix/*, release/*
#   Integration  → dev only (after both frontend + backend pass)
#   Deploy       → main only (after full CI passes)
# ─────────────────────────────────────────────────────────────────────────────

jobs:

  # ───────────────────────────────────────────────────────────────────────────
  # FRONTEND CI
  # Runs on: feature/frontend*, dev, main, hotfix/*, release/*, any PR to dev/main
  # ───────────────────────────────────────────────────────────────────────────
  frontend:
    name: Frontend CI
    runs-on: ubuntu-latest
    # Skip on pure backend feature branches (nothing frontend changed there)
    if: |
      github.event_name == 'pull_request' ||
      contains(github.ref, 'refs/heads/main') ||
      contains(github.ref, 'refs/heads/dev') ||
      contains(github.ref, 'refs/heads/feature/frontend') ||
      contains(github.ref, 'refs/heads/hotfix/') ||
      contains(github.ref, 'refs/heads/release/')
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

      - name: Type check
        run: npm run type-check --if-present

      - name: Unit tests
        run: npm test --if-present

      - name: Build
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/dist
          retention-days: 7

  # ───────────────────────────────────────────────────────────────────────────
  # BACKEND CI
  # Runs on: feature/backend*, dev, main, hotfix/*, release/*, any PR to dev/main
  # ───────────────────────────────────────────────────────────────────────────
  backend:
    name: Backend CI
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'pull_request' ||
      contains(github.ref, 'refs/heads/main') ||
      contains(github.ref, 'refs/heads/dev') ||
      contains(github.ref, 'refs/heads/feature/backend') ||
      contains(github.ref, 'refs/heads/hotfix/') ||
      contains(github.ref, 'refs/heads/release/')
    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx ruff

      - name: Lint (ruff)
        run: ruff check . --ignore E501

      - name: Tests (pytest)
        run: pytest --tb=short -v || echo "No tests found"

  # ───────────────────────────────────────────────────────────────────────────
  # INTEGRATION CHECK  (dev branch only)
  # Verifies that frontend + backend work together before promoting to main.
  # ───────────────────────────────────────────────────────────────────────────
  integration:
    name: Integration Check
    needs: [frontend, backend]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/dev' && github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download frontend build
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: frontend/dist

      - name: Integration summary
        run: |
          echo "✅  Integration check complete on dev"
          echo ""
          echo "Both frontend and backend passed their individual CI checks."
          echo "This build is ready to be promoted to main via a PR."
          echo ""
          echo "Frontend build size:"
          du -sh frontend/dist 2>/dev/null || echo "  (artifact not available)"

  # ───────────────────────────────────────────────────────────────────────────
  # DEPLOY  (main branch only — production)
  # Only runs after full CI passes on a push to main.
  # ───────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Production
    needs: [frontend, backend]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download frontend build
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: frontend/dist

      - name: Deploy summary
        run: |
          echo "🚀  Production deployment ready!"
          echo ""
          echo "Artifacts:"
          echo "   Frontend → frontend/dist"
          echo "   Backend  → ./backend  (uvicorn app.main:app)"
          echo ""
          echo "Uncomment one of the cloud deployment blocks below to"
          echo "wire up automatic deployment to your target platform."

      # ── Cloud deployment options (uncomment the one you need) ──────────────

      # --- Vercel (Frontend) ---
